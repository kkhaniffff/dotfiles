[font]
normal = { family = "CommitMono", style = "Regular" }
size = 11

[window]
decorations = "None"
padding = { x = 5, y = 5 }

[colors.primary]
background = "#1e1e1e"
foreground = "#d0d0d0"

[colors.normal]
black   = "#1e1e1e"
red     = "#a87878"
green   = "#669985"
yellow  = "#bbbb88"
blue    = "#8877bb"
magenta = "#8877bb"
cyan    = "#669985"
white   = "#d0d0d0"

[colors.bright]
black   = "#252525"
red     = "#a87878"
green   = "#669985"
yellow  = "#bbbb88"
blue    = "#8877bb"
magenta = "#8877bb"
cyan    = "#669985"
white   = "#d0d0d0"

[colors.cursor]
text = "#1e1e1e"
cursor = "#669985"
